apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: 644981759771.dkr.ecr.us-east-1.amazonaws.com/prod-user-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MONGO_URI
          value: "mongodb://mongodb:27017/shop"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce-apps
spec:
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
