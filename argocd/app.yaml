apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopscale
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/amr-elzoghby/web-app-gitops.git
    targetRevision: HEAD
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce-apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
