
# ShopMicro — GitOps Deployment Manifest
# Each service has its own image tag, updated independently by CI/CD pipelines

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image: webapp-frontend
  tag: "v2"

# ── Backend Microservices ────────────────────────────────────────────────────
user-service:
  image: webapp-user-service
  tag: "v1"

catalog-service:
  image: webapp-catalog-service
  tag: "v1"

cart-service:
  image: webapp-cart-service
  tag: "v3"

order-service:
  image: webapp-order-service
  tag: "v1"

payment-service:
  image: webapp-payment-service
  tag: "v1"
